on:
  workflow_call:
    inputs:
      SERVICE_NAME:
        required: true
        type: string
      SERVICE_PORT:
        required: true
        type: string
      PATH_SERVICE:
        required: true
        type: string
      DOCKERFILE_PATH:
        required: true
        type: string
      PACKAGE_FILTER:
        required: true
        type: string

    secrets:
      ALB_DEV:
        required: true
      ALB_QA:
        required: true
      ALB_PROD:
        required: true
      AWS_DEV_ACCOUNT_ID:
        required: true
      AWS_QA_ACCOUNT_ID:
        required: true
      AWS_PROD_ACCOUNT_ID:
        required: true
      AWS_PIPELINE_ACCESS_KEY_ID:
        required: true
      AWS_PIPELINE_SECRET_ACCESS_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

env:
  BUILD_SHA: ${{ github.sha }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_PIPELINE_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_PIPELINE_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-1
  ROLE_DURATION_SECONDS: 1200
  AWS_DEFAULT_OUTPUT: json
  AWS_DEPLOYMENT_ROLE: pipeline
  ORGANIZATION: lineup
  SERVICE_NAME: ${{ inputs.SERVICE_NAME }}
  SERVICE_PORT: ${{ inputs.SERVICE_PORT }}
  PATH_SERVICE: ${{ inputs.PATH_SERVICE }}
  DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH }}
  PACKAGE_FILTER: ${{ inputs.PACKAGE_FILTER }}

jobs:
  build:
    name: Build PNPM Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set DEV environment variables
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature*' || github.ref == 'refs/heads/hotfix*'
        run: |
          echo "::set-env name=STAGE::dev"
          echo "::set-env name=DOCKER_BUILD_TARGET::debug"
          echo "::set-env name=AWS_ACCOUNT_ID::${{ secrets.AWS_DEV_ACCOUNT_ID }}"
          echo "::set-env name=ALB::${{ secrets.ALB_DEV }}"
          echo "::set-env name=NEWRELIC::${{ secrets.NEWRELIC }}"
      - name: Set PROD environment variables
        if: github.ref == 'refs/heads/qa'
        run: |
          echo "::set-env name=STAGE::qa"
          echo "::set-env name=DOCKER_BUILD_TARGET::debug"
          echo "::set-env name=AWS_ACCOUNT_ID::${{ secrets.AWS_QA_ACCOUNT_ID }}"
          echo "::set-env name=ALB::${{ secrets.ALB_QA }}"
          echo "::set-env name=NEWRELIC::${{ secrets.NEWRELIC }}"
      - name: Set PROD environment variables
        if: github.ref == 'refs/heads/prod'
        run: |
          echo "::set-env name=STAGE::prod"
          echo "::set-env name=DOCKER_BUILD_TARGET::debug"
          echo "::set-env name=AWS_ACCOUNT_ID::${{ secrets.AWS_PROD_ACCOUNT_ID }}"
          echo "::set-env name=ALB::${{ secrets.ALB_PROD }}"
          echo "::set-env name=NEWRELIC::${{ secrets.NEWRELIC }}"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          pnpm typecheck

      - name: Run tests
        run: |
          pnpm test

      - name: Build application
        run: |
          pnpm build

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/prod'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ format('arn:aws:iam::{0}:role/{1}', env.AWS_ACCOUNT_ID, env.AWS_DEPLOYMENT_ROLE) }}
          role-duration-seconds: ${{ env.ROLE_DURATION_SECONDS }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/prod'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/prod'
        uses: docker/setup-buildx-action@v3

      - name: Build, tag and push Docker image to Amazon ECR
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod' || github.ref == 'refs/heads/qa'
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.SERVICE_NAME }}-${{ env.STAGE }}
        run: |
          ECR_TARGET="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Building image:"
          echo "Service: ${SERVICE_NAME}"
          echo "Dockerfile: ${DOCKERFILE_PATH}"
          echo "Context: ."
          echo "Target: ${ECR_TARGET}"

          docker buildx build \
            --platform linux/amd64 \
            -f "${DOCKERFILE_PATH}" \
            -t "${ECR_TARGET}" \
            --push \
            .

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST --data-urlencode "payload={\"channel\": \"#pipeline-notifications\", \"username\": \"${{ github.actor }}\", \"text\": \"Workflow Build PNPM Deploy ${{ env.SERVICE_NAME }}-${{ github.ref_name }} failed. See details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Success
        if: success()
        run: |
          curl -X POST --data-urlencode "payload={\"channel\": \"#pipeline-notifications\", \"username\": \"${{ github.actor }}\", \"text\": \"Workflow Build PNPM Deploy ${{ env.SERVICE_NAME }}-${{ github.ref_name }} succeeded. See details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}